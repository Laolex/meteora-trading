services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meteora
      POSTGRES_PASSWORD: meteora
      POSTGRES_DB: meteora_agent
    ports:
      - "5432:5432"
    volumes:
      - meteora_pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

volumes:
  meteora_pgdata:
