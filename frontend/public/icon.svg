<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- dark background -->
  <rect width="40" height="40" rx="9" fill="#0c1117"/>
  <!-- DLMM bin histogram — 7 bars, bell distribution, bottom-aligned at y=37 -->
  <rect x="1"  y="31" width="4" height="6"  rx="1.2" fill="#14f195" opacity="0.18"/>
  <rect x="7"  y="27" width="4" height="10" rx="1.2" fill="#14f195" opacity="0.38"/>
  <rect x="13" y="20" width="4" height="17" rx="1.2" fill="#14f195" opacity="0.62"/>
  <rect x="19" y="9"  width="4" height="28" rx="1.2" fill="#14f195" filter="url(#g)"/>
  <rect x="25" y="20" width="4" height="17" rx="1.2" fill="#14f195" opacity="0.62"/>
  <rect x="31" y="27" width="4" height="10" rx="1.2" fill="#14f195" opacity="0.38"/>
  <rect x="37" y="31" width="2" height="6"  rx="1.2" fill="#14f195" opacity="0.18"/>
  <!-- baseline -->
  <line x1="1" y1="38" x2="39" y2="38" stroke="#14f195" stroke-width="0.8" opacity="0.25"/>
</svg>
