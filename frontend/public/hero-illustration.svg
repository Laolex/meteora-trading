<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blurred" />
      <feFlood flood-color="#14f195" flood-opacity="1" result="color" />
      <feComposite in="color" in2="blurred" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  <radialGradient id="centerGlow" cx="450" cy="200" r="200" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="rgba(20,241,149,0.08)" />
    <stop offset="100%" stop-color="rgba(20,241,149,0)" />
  </radialGradient>
  </defs>

  <rect x="0" y="0" width="900" height="380" fill="#0a0f0d" />

  <!-- LEFT SIDE: Bell curve histogram -->
  <g transform="translate(30,0)">
    <rect x="0" y="322" width="20" height="18" fill="#14f195" opacity="0.18" rx="3" />
    <rect x="26" y="312" width="20" height="28" fill="#14f195" opacity="0.18" rx="3" />
    <rect x="52" y="296" width="20" height="44" fill="#14f195" opacity="0.35" rx="3" />
