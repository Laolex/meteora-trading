    <rect x="312" y="322" width="20" height="18" fill="#14f195" opacity="0.18" rx="3" />
    <line x1="0" y1="341" x2="332" y2="341" stroke="#14f195" opacity="0.2" stroke-width="1" />
  </g>

  <!-- RIGHT SIDE: Glowing circles and paths -->
